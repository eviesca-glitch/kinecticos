    if (plan.exercises) all.push(...plan.exercises);
    if (plan.modes) for (const m of Object.values(plan.modes)) all.push(...m.exercises);
  }
  return all;
}

function useLocalStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === "function" ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

// Stepper — handles typed input correctly, no 0-trap, no mid-type reset
function Stepper({ value, onChange, min=0, step=1, accent, wide=false }) {
  const [raw, setRaw] = useState(value === 0 ? "" : String(value));
  const inputRef = useRef(null);
  const isFocused = useRef(false);

  // Only sync display from external value when user is NOT typing
  useEffect(() => {
    if (!isFocused.current) {
      setRaw(value === 0 ? "" : String(value));
    }
  }, [value]);

  const commit = (str) => {
    const n = parseFloat(str);
    const valid = !isNaN(n) && n >= min;
    const next = valid ? parseFloat(n.toFixed(2)) : min;
    onChange(next);
    setRaw(next === 0 ? "" : String(next));
  };

  const nudge = (dir) => {
    const next = Math.max(min, parseFloat(((value || 0) + dir * step).toFixed(2)));
    onChange(next);
  };

  return (
    <div style={{
      display:"flex", alignItems:"center",
      background:"#1a1a1a", borderRadius:12, overflow:"hidden",
      width: wide ? "100%" : "auto"
    }}>
      <button onMouseDown={e => { e.preventDefault(); nudge(-1); }}
        style={{ width:48, height:52, background:"none", border:"none", color:"#ccc", fontSize:24, cursor:"pointer", flexShrink:0 }}>−</button>
      <input
        ref={inputRef}
        type="number"
        value={raw}
        placeholder="0"
        onFocus={e => { isFocused.current = true; e.target.select(); }}
        onChange={e => setRaw(e.target.value)}
        onBlur={e => { isFocused.current = false; commit(e.target.value); }}
        onKeyDown={e => { if (e.key === "Enter") { commit(raw); inputRef.current?.blur(); } }}
        style={{
          flex:1, minWidth:0, height:52, background:"none", border:"none",
          color:"#fff", fontSize:22, fontWeight:800, textAlign:"center",
          outline:"none", fontFamily:"inherit"
        }}
      />
      <button onMouseDown={e => { e.preventDefault(); nudge(1); }}
        style={{ width:48, height:52, background:"none", border:"none", color:accent, fontSize:24, cursor:"pointer", flexShrink:0 }}>+</button>
    </div>
  );
}

function SetLogger({ exercise, sets, onUpdate, accent }) {
  const isGym = exercise.equipment?.includes("gym");
  const hasWeight = isGym || (exercise.target?.weight ?? 0) > 0;
  const weightStep = isGym ? 2.5 : 5;

  const tReps = exercise.target?.reps ?? 0;
  const tSecs = exercise.target?.seconds ?? 0;
  const tSets = exercise.target?.sets ?? 0;

  // Only auto-populate on first open (when sets array is empty)
  const didInit = useRef(false);
  useEffect(() => {
    if (!didInit.current && sets.length === 0) {
      didInit.current = true;
      const fresh = exercise.type === "time"
        ? { id: Date.now(), seconds: tSecs, difficulty: 5, note: "" }
        : { id: Date.now(), reps: tReps, weight: exercise.target?.weight ?? 0, difficulty: 5, note: "" };
      onUpdate([fresh]);
    }
  }, []); // eslint-disable-line

  const addSet = () => {
    const last = sets[sets.length - 1];
    const fallback = exercise.type === "time"
      ? { id: Date.now(), seconds: tSecs, difficulty: 5, note: "" }
      : { id: Date.now(), reps: tReps, weight: exercise.target?.weight ?? 0, difficulty: 5, note: "" };
    const next = last ? { ...last, id: Date.now(), note: "" } : fallback;
    onUpdate([...sets, next]);
  };

  const upd = (i, field, val) => onUpdate(sets.map((s,idx) => idx===i ? {...s,[field]:val} : s));
  const rem = (i) => onUpdate(sets.filter((_,idx) => idx !== i));

  return (
    <div>
      {sets.map((s, i) => {
        const hit = exercise.type === "time" ? (s.seconds >= tSecs && tSecs > 0) : (s.reps >= tReps && tReps > 0);
        const setKey = s.id ?? i; // stable id preferred, fallback for legacy data
        return (
          <div key={setKey} style={{
            background:"#141414", borderRadius:14, padding:"14px",
            marginBottom:10, border:`1px solid ${hit ? accent+"66" : "#242424"}`
          }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{
                  width:28, height:28, borderRadius:"50%",
                  background: hit ? accent : "#222",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:11, fontWeight:900, color: hit ? "#000" : "#666",
                  transition:"background 0.2s"
                }}>S{i+1}</div>
                {hit && <span style={{ fontSize:11, color:accent }}>TARGET HIT ✓</span>}
              </div>
              <button onClick={() => rem(i)}
                style={{ background:"none", border:"none", color:"#444", cursor:"pointer", fontSize:22, lineHeight:1, padding:"0 4px" }}>×</button>
            </div>

            {exercise.type === "time" ? (
              <div>
                <Label>SECONDS{tSecs > 0 ? <span style={{color:"#333",fontWeight:400}}> / {tSecs}s target</span> : ""}</Label>
                <Stepper value={s.seconds} onChange={v => upd(i,"seconds",v)} step={1} accent={accent} wide />
              </div>
            ) : (
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex: hasWeight ? 1 : "unset", minWidth: hasWeight ? 0 : 160 }}>
                  <Label>REPS{tReps > 0 ? <span style={{color:"#333",fontWeight:400}}> / {tReps}</span> : ""}</Label>
                  <Stepper value={s.reps} onChange={v => upd(i,"reps",v)} step={1} accent={accent} wide />
                </div>
                {hasWeight && (
                  <div style={{ flex:1, minWidth:0 }}>
                    <Label>WEIGHT (kg)</Label>
                    <Stepper value={s.weight ?? 0} onChange={v => upd(i,"weight",v)} step={weightStep} accent={accent} wide />
                  </div>
                )}
              </div>
            )}

            <div style={{ marginTop:14 }}>
              <Label>EFFORT <span style={{color:accent,fontWeight:400}}>{s.difficulty}/10</span></Label>
              <RatingDots value={s.difficulty} onChange={v => upd(i,"difficulty",v)} color={accent} />
            </div>

            <input
              placeholder="Form note, cue, fatigue..."
              value={s.note}
              onChange={e => upd(i,"note",e.target.value)}
              style={{
                background:"#1e1e1e", border:"1px solid #2a2a2a", borderRadius:10,
                color:"#999", padding:"10px 12px", fontSize:13, width:"100%",
                boxSizing:"border-box", outline:"none", marginTop:12, fontFamily:"inherit"
              }}
            />
          </div>
        );
      })}

      <button onClick={addSet} style={{
        width:"100%", padding:"13px", borderRadius:12,
        border:`1px dashed ${accent}44`, background:`${accent}08`,
        color:accent, cursor:"pointer", fontSize:13, letterSpacing:1.5, fontWeight:700
      }}>
        + ADD SET{tSets > 0 ? ` (${sets.length}/${tSets})` : ""}
      </button>
    </div>
  );
}

function TargetEditor({ ex, customTarget, onSave, onClose, accent }) {
  const isTime = ex.type === "time";
  const base = customTarget ?? ex.target;
  const [sets, setSets] = useState(base.sets ?? 3);
  const [reps, setReps] = useState(base.reps ?? 0);
  const [secs, setSecs] = useState(base.seconds ?? 0);
  const [weight, setWeight] = useState(base.weight ?? 0);

  return (
    <div style={{
      background:"#0d0d0d", border:`1px solid ${accent}44`,
      borderRadius:14, padding:16, marginBottom:10
    }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <Label style={{ marginBottom:0 }}>EDIT TARGET</Label>
        <button onClick={onClose} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:18 }}>×</button>
      </div>

      <div style={{ display:"flex", gap:10, marginBottom:12 }}>
        <div style={{ flex:1 }}>
          <Label>SETS</Label>
          <Stepper value={sets} onChange={setSets} step={1} min={1} accent={accent} wide />
        </div>
        <div style={{ flex:1 }}>
          <Label>{isTime ? "SECONDS" : "REPS"}</Label>
          <Stepper
            value={isTime ? secs : reps}
            onChange={isTime ? setSecs : setReps}
            step={1} min={1} accent={accent} wide
          />
        </div>
        {!isTime && (ex.equipment?.includes("gym") || weight > 0) && (
          <div style={{ flex:1 }}>
            <Label>WEIGHT (kg)</Label>
            <Stepper value={weight} onChange={setWeight} step={2.5} min={0} accent={accent} wide />
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:8 }}>
        <button onClick={onClose} style={{
          flex:1, padding:"11px", borderRadius:10,
          border:"1px solid #222", background:"none",
          color:"#555", cursor:"pointer", fontSize:13, fontWeight:700
        }}>Cancel</button>
        <button onClick={() => {
          const t = isTime
            ? { sets, seconds: secs }
            : { sets, reps, weight };
          onSave(t);
          onClose();
        }} style={{
          flex:2, padding:"11px", borderRadius:10,
          border:`1px solid ${accent}66`, background:`${accent}18`,
          color:accent, cursor:"pointer", fontSize:13, fontWeight:800
        }}>Save Target</button>
      </div>
    </div>
  );
}

function ExerciseCard({ ex, sets, onUpdate, accent, prMap, customTargets, onSaveTarget }) {
  const [open, setOpen] = useState(false);
  const [showVars, setShowVars] = useState(false);
  const [showTargetEditor, setShowTargetEditor] = useState(false);
  const [displayName, setDisplayName] = useState(ex.name);
  const [activeEquip, setActiveEquip] = useState(ex.equipment ?? []);

  // Merge custom target over default
  const effectiveTarget = useMemo(() => ({
    ...ex.target,
    ...(customTargets?.[ex.id] ?? {})
  }), [ex.target, ex.id, customTargets]);

  // Use effective target for display and coach engine
  const activeEx = useMemo(() => ({
    ...ex,
    equipment: activeEquip,
    target: effectiveTarget
  }), [ex, activeEquip, effectiveTarget]);

  const hasMeaningfulData = sets.length > 0 && sets.some(s =>
    ex.type === "time" ? (s.seconds ?? 0) > 0 : (s.reps ?? 0) > 0
  );

  const isPR = useMemo(() => {
    if (!hasMeaningfulData) return false;
    const best = prMap[ex.id];
    if (ex.type === "reps") {
      const top = Math.max(...sets.map(s => s.reps ?? 0));
      return best ? top > (best.reps ?? 0) : top > 0;
    }
    const top = Math.max(...sets.map(s => s.seconds ?? 0));
    return best ? top > (best.seconds ?? 0) : top > 0;
  }, [sets, prMap, ex.id, ex.type, hasMeaningfulData]);

  const pills = hasMeaningfulData
    ? sets.filter(s => ex.type === "time" ? (s.seconds??0)>0 : (s.reps??0)>0)

            fontSize:11, padding:"3px 9px", borderRadius:8,
            background:accent+"18", color:accent, fontWeight:700
          }}>
            {ex.type === "time" ? `${s.seconds}s` : `${s.reps}${(s.weight??0)>0?`@${s.weight}kg`:""}`}

  const hasCustomTarget = !!(customTargets?.[ex.id]);

  const selectVar = (v) => {
    setDisplayName(v.name);
    setActiveEquip(v.equipment ?? ex.equipment ?? []);

    <div style={{ marginBottom:10 }}>

        <div style={{

        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ color:"#fff", fontSize:15, fontWeight:700, lineHeight:1.25 }}>{displayName}</div>
          <div style={{ color:"#555", fontSize:12, marginTop:3 }}>
            {ex.type === "time"
              ? `${effectiveTarget.sets} sets · ${effectiveTarget.seconds}s each`
              : `${effectiveTarget.sets} sets · ${effectiveTarget.reps} reps${(effectiveTarget.weight??0)>0?` · ${effectiveTarget.weight}kg`:""}`}
            {hasCustomTarget && <span style={{ color:accent, marginLeft:6, fontSize:10 }}>✎ custom</span>}
          </div>
          <div style={{ display:"flex", gap:4, marginTop:6, flexWrap:"wrap" }}>
            {activeEquip.map(e => <EquipBadge key={e} eq={e} />)}
          </div>
          {pills.length > 0 && (
            <div style={{ display:"flex", gap:4, marginTop:8, flexWrap:"wrap" }}>{pills}</div>
          )}
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6, flexShrink:0 }}>
          {isPR && <span style={{ background:"#fbbf24", color:"#000", fontSize:10, fontWeight:900, padding:"2px 7px", borderRadius:6, letterSpacing:0.8 }}>PR</span>}
          <span style={{ color:"#333", fontSize:13 }}>{open ? "▲" : "▼"}</span>
        </div>
      </button>

      {open && (

    return i >= 0 ? i : 0;

  const todayLog = workoutLog?.[todayKey] ?? {};

function RecoveryView({ recoveryLog, setRecoveryLog }) {
  const today = new Date().toISOString().split("T")[0];
  const entry = recoveryLog[today] ?? { soreness:5, sleep:7, grip:"recovered", shoulder:"recovered" };
  const up = (field, val) => setRecoveryLog(prev => ({ ...prev, [today]: { ...entry, [field]: val } }));

  const last7 = useMemo(() => Array.from({ length:7 }, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - i);
    return recoveryLog[d.toISOString().split("T")[0]];
  }).filter(Boolean), [recoveryLog]);

  const avgSore  = last7.length ? last7.reduce((a,b) => a+(b.soreness??5),0)/last7.length : 5;
  const avgSleep = last7.length ? last7.reduce((a,b) => a+(b.sleep??7),0)/last7.length : 7;
  const risk = avgSore>7||avgSleep<6 ? "HIGH" : avgSore>5||avgSleep<7 ? "MODERATE" : "LOW";
  const riskColor = { HIGH:"#fb7185", MODERATE:"#fbbf24", LOW:"#4ade80" }[risk];

  return (
    <div style={{ padding:"16px 16px 90px" }}>
      <div style={{ fontSize:22, fontWeight:900, marginBottom:2 }}>RECOVERY</div>
      <div style={{ fontSize:12, color:"#444", marginBottom:22, letterSpacing:1 }}>{today}</div>

      <Card label="MUSCLE SORENESS">
        <RatingDots value={entry.soreness} onChange={v => up("soreness",v)} color="#fb7185" />
        <div style={{ color:"#666", fontSize:12, marginTop:8 }}>{entry.soreness}/10</div>
      </Card>

      <Card label="SLEEP QUALITY">
        <RatingDots value={entry.sleep} onChange={v => up("sleep",v)} color="#38bdf8" />
        <div style={{ color:"#666", fontSize:12, marginTop:8 }}>{entry.sleep}/10</div>
      </Card>

      <Card label="GRIP FATIGUE">
        <Toggle value={entry.grip} opts={["recovered","fatigued"]}
          onChange={v => up("grip",v)} colors={{ recovered:"#4ade80", fatigued:"#fb7185" }} />
      </Card>

      <Card label="SHOULDER STATUS">
        <Toggle value={entry.shoulder} opts={["recovered","fatigued"]}
          onChange={v => up("shoulder",v)} colors={{ recovered:"#4ade80", fatigued:"#fb7185" }} />
      </Card>

      <div style={{
        background:`${riskColor}0d`, border:`1px solid ${riskColor}44`,
        borderRadius:16, padding:18, marginTop:4
      }}>
        <Label>7-DAY DELOAD SIGNAL</Label>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ width:14, height:14, borderRadius:"50%", background:riskColor, boxShadow:`0 0 10px ${riskColor}`, flexShrink:0 }} />
          <div>
            <div style={{ color:riskColor, fontSize:20, fontWeight:900 }}>{risk} RISK</div>
            <div style={{ color:"#555", fontSize:12, marginTop:2 }}>
              Soreness {avgSore.toFixed(1)} · Sleep {avgSleep.toFixed(1)}/10 · 7-day avg
            </div>
          </div>
        </div>
        <div style={{ color:riskColor, fontSize:13, marginTop:12, lineHeight:1.6 }}>
          {risk==="HIGH" && "⚠ Deload this week. Cut volume 40–50%."}
          {risk==="MODERATE" && "Monitor carefully. Prioritize sleep and protein."}
          {risk==="LOW" && "✓ Full capacity. Chase PRs."}
        </div>
      </div>
    </div>
  );
}

function MiniChart({ title, data, color, unit }) {
  if (!data.length || data.every(d => !d.value)) return null;
  const max = Math.max(...data.map(d => d.value), 1);

  return (
    <div style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:16, padding:16, marginBottom:12 }}>
      <Label>{title}</Label>
      <div style={{ display:"flex", alignItems:"flex-end", gap:3, height:80 }}>
        {data.map((d, i) => {
          const isLast = i === data.length - 1;
          const barH = d.value ? Math.max((d.value/max)*56, 3) : 1;
          // Fix: format label cleanly — remove leading dash
          const label = d.label.replace(/^-/,"");
          return (
            <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, justifyContent:"flex-end", height:"100%" }}>
              {d.value > 0 && (
                <div style={{ fontSize:9, color: isLast ? color : "#3a3a3a", textAlign:"center" }}>
                  {d.value}{unit}
                </div>
              )}
              <div style={{
                width:"100%", borderRadius:4,
                background: isLast ? color : `${color}44`,
                height:`${barH}px`, transition:"height 0.35s ease"
              }} />
              <div style={{ fontSize:9, color:"#333", whiteSpace:"nowrap" }}>{label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── PROGRESSIVE OVERLOAD ENGINE ─────────────────────────────────────────────

function analyzeProgress(workoutLog, customTargets = {}) {
  const insights = [];
  const today = new Date();

  // For each exercise that has been logged at least twice
  const exSessions = {}; // exId -> [{date, sets}]
  const sortedDates = Object.keys(workoutLog).sort();

  for (const dt of sortedDates) {
    const dayData = workoutLog[dt];
    if (!dayData || typeof dayData !== "object") continue;
    for (const [exId, sets] of Object.entries(dayData)) {
      if (!Array.isArray(sets) || !sets.length) continue;
      const meaningful = sets.filter(s =>
        (s.reps ?? 0) > 0 || (s.seconds ?? 0) > 0
      );
      if (!meaningful.length) continue;
      if (!exSessions[exId]) exSessions[exId] = [];
      exSessions[exId].push({ date: dt, sets: meaningful });
    }
  }

  for (const [exId, sessions] of Object.entries(exSessions)) {
    if (sessions.length < 2) continue;
    const ex = ALL_EXERCISES.find(e => e.id === exId);
    if (!ex) continue;

    // Merge custom target over default
    const effectiveTarget = { ...ex.target, ...(customTargets[exId] ?? {}) };
    const tReps = effectiveTarget.reps ?? 0;
    const tSecs = effectiveTarget.seconds ?? 0;
    const tSets = effectiveTarget.sets ?? 0;
    const hasVariations = (ex.variations?.length ?? 0) > 0;

    // Last 14 days sessions only
    const cutoff = new Date(today);
    cutoff.setDate(cutoff.getDate() - 14);
    const cutoffStr = cutoff.toISOString().split("T")[0];
    const recentSessions = sessions.filter(s => s.date >= cutoffStr);

    // Last 21 days for plateau check
    const cutoff21 = new Date(today);
    cutoff21.setDate(cutoff21.getDate() - 21);
    const cutoff21Str = cutoff21.toISOString().split("T")[0];
    const recentSessions21 = sessions.filter(s => s.date >= cutoff21Str);

    if (ex.type === "reps" && tReps > 0) {
      // Best rep set across all time
      const allTimeBest = Math.max(...sessions.flatMap(s => s.sets.map(set => set.reps ?? 0)));
      // Best in last 21 days
      const recent21Best = recentSessions21.length
        ? Math.max(...recentSessions21.flatMap(s => s.sets.map(set => set.reps ?? 0)))
        : 0;
      // Recent 2 sessions — did ALL sets hit target?
      const last2 = recentSessions.slice(-2);
      const last2AllHit = last2.length === 2 && last2.every(session =>
        session.sets.length >= Math.max(tSets - 1, 1) &&
        session.sets.every(s => (s.reps ?? 0) >= tReps)
      );
      // Plateau: 3+ sessions, no improvement in 21 days vs all-time
      const plateau = recentSessions21.length >= 3 &&
        allTimeBest > 0 &&
        recent21Best < allTimeBest * 0.95;
      // Regression: last session average is 20%+ below all-time best
      const lastSession = sessions[sessions.length - 1];
      const lastAvg = lastSession.sets.reduce((a,s)=>a+(s.reps??0),0) / lastSession.sets.length;
      const regression = allTimeBest > 0 && sessions.length >= 3 && lastAvg < allTimeBest * 0.8;

      if (last2AllHit) {
        const nextVar = hasVariations
          ? ex.variations.find(v => v.level > (ex.variations.find(vv => vv.name.toLowerCase().includes(ex.name.toLowerCase().split(" ")[0]?.toLowerCase() ?? ""))?.level ?? 0))
          : null;
        insights.push({
          type: "progress",
          exId, exName: ex.name,
          message: `Consistently hitting ${tReps} reps across 2 sessions.`,
          action: hasVariations ? `Ready to progress — try the next variation` : `Add 1–2 reps or introduce the weighted vest`,
          color: "#4ade80"
        });
      } else if (plateau) {
        insights.push({
          type: "plateau",
          exId, exName: ex.name,
          message: `No improvement in 3+ weeks (best: ${allTimeBest} reps).`,
          action: hasVariations ? `Switch variation or reduce rest periods` : `Try a deload set this week`,
          color: "#fbbf24"
        });
      } else if (regression) {
        insights.push({
          type: "regression",
          exId, exName: ex.name,
          message: `Recent performance below your best (${allTimeBest} reps).`,
          action: `Check recovery — soreness or sleep may be limiting output`,
          color: "#fb7185"
        });
      }
    }

    if (ex.type === "time" && tSecs > 0) {
      const allTimeBest = Math.max(...sessions.flatMap(s => s.sets.map(set => set.seconds ?? 0)));
      const recent21Best = recentSessions21.length
        ? Math.max(...recentSessions21.flatMap(s => s.sets.map(set => set.seconds ?? 0)))
        : 0;
      const last2 = recentSessions.slice(-2);
      const last2AllHit = last2.length === 2 && last2.every(session =>
        session.sets.length >= Math.max(tSets - 1, 1) &&
        session.sets.every(s => (s.seconds ?? 0) >= tSecs)
      );
      const plateau = recentSessions21.length >= 3 &&
        allTimeBest > 0 &&
        recent21Best < allTimeBest * 0.95;
      const lastSession = sessions[sessions.length - 1];
      const lastAvg = lastSession.sets.reduce((a,s)=>a+(s.seconds??0),0) / lastSession.sets.length;
      const regression = allTimeBest > 0 && sessions.length >= 3 && lastAvg < allTimeBest * 0.8;

      if (last2AllHit) {
        insights.push({
          type: "progress",
          exId, exName: ex.name,
          message: `Hitting ${tSecs}s target consistently across 2 sessions.`,
          action: hasVariations ? `Ready for the next variation` : `Increase hold target by 5s`,
          color: "#4ade80"
        });
      } else if (plateau) {
        insights.push({
          type: "plateau",
          exId, exName: ex.name,
          message: `Hold time stalled — best ${allTimeBest}s, no improvement in 3 weeks.`,
          action: `Add more FL Raises for strength, or extend rest between holds`,
          color: "#fbbf24"
        });
      } else if (regression) {
        insights.push({
          type: "regression",
          exId, exName: ex.name,
          message: `Hold times dropping (best: ${allTimeBest}s).`,
          action: `Prioritize recovery — grip and shoulder fatigue are likely factors`,
          color: "#fb7185"
        });
      }
    }
  }

  // Sort: progress first, then plateau, then regression
  const order = { progress: 0, plateau: 1, regression: 2 };
  insights.sort((a,b) => order[a.type] - order[b.type]);
  return insights;
}

function InsightCard({ insight }) {
  const icons = { progress: "▲", plateau: "◆", regression: "▼" };
  const labels = { progress: "PROGRESS READY", plateau: "PLATEAU", regression: "REGRESSION" };
  return (
    <div style={{
      background:`${insight.color}0d`,
      border:`1px solid ${insight.color}44`,
      borderRadius:14, padding:14, marginBottom:10
    }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
        <div style={{
          width:26, height:26, borderRadius:"50%",
          background:`${insight.color}22`, border:`1px solid ${insight.color}66`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:11, color:insight.color, fontWeight:900, flexShrink:0
        }}>{icons[insight.type]}</div>
        <div>
          <div style={{ fontSize:10, color:insight.color, fontWeight:800, letterSpacing:1.5 }}>
            {labels[insight.type]}
          </div>
          <div style={{ fontSize:13, color:"#fff", fontWeight:700, marginTop:1 }}>
            {insight.exName}
          </div>
        </div>
      </div>
      <div style={{ fontSize:12, color:"#888", lineHeight:1.5, marginBottom:6 }}>
        {insight.message}
      </div>
      <div style={{
        fontSize:12, color:insight.color, lineHeight:1.5,
        paddingTop:8, borderTop:`1px solid ${insight.color}22`
      }}>
        → {insight.action}
      </div>
    </div>
  );
}

function DashboardView({ workoutLog, prMap, bodyweightLog, customTargets }) {
  // Get last 10 logged dates sorted
  const dates = useMemo(() => Object.keys(workoutLog).sort().slice(-10), [workoutLog]);

  const pullupData = useMemo(() => dates.map(dt => ({
    label: dt.slice(5),
    value: (workoutLog[dt]?.["wg_pullups"] ?? []).reduce((a,s)=>a+(s.reps??0), 0)
  })), [dates, workoutLog]);

  const flData = useMemo(() => dates.map(dt => {
    const sets = [...(workoutLog[dt]?.["oneleg_fl"]??[]), ...(workoutLog[dt]?.["tuck_fl"]??[])];
    return { label: dt.slice(5), value: sets.length ? Math.max(...sets.map(s=>s.seconds??0)) : 0 };
  }), [dates, workoutLog]);

  const bwData = useMemo(() => {
    const keys = Object.keys(bodyweightLog).sort().slice(-14);
    return keys.map(k => ({ label: k.slice(5), value: bodyweightLog[k] }));
  }, [bodyweightLog]);

  const prEntries = useMemo(() =>
    Object.entries(prMap).map(([id,pr]) => {
      const ex = ALL_EXERCISES.find(e => e.id === id);
      return ex ? { ex, pr } : null;
    }).filter(Boolean),
  [prMap]);

  const insights = useMemo(() => analyzeProgress(workoutLog, customTargets), [workoutLog, customTargets]);

  return (
    <div style={{ padding:"16px 16px 90px" }}>
      <div style={{ fontSize:22, fontWeight:900, marginBottom:20 }}>PERFORMANCE</div>

      {/* Insight cards */}
      {insights.length > 0 && (
        <div style={{ marginBottom:20 }}>
          <Label>COACH INSIGHTS</Label>
          {insights.map((ins, i) => <InsightCard key={i} insight={ins} />)}
        </div>
      )}
      {insights.length === 0 && Object.keys(workoutLog).length >= 2 && (
        <div style={{
          background:"#111", border:"1px solid #1e1e1e", borderRadius:14,
          padding:16, marginBottom:20, color:"#444", fontSize:13, textAlign:"center"
        }}>
          Log 2+ sessions per exercise to unlock coach insights
        </div>
      )}

      <MiniChart title="PULL-UP VOLUME (reps/session)" data={pullupData} color="#4ade80" unit="" />
      <MiniChart title="FRONT LEVER MAX HOLD (sec)" data={flData} color="#a78bfa" unit="s" />
      {bwData.length > 0 && <MiniChart title="BODY WEIGHT (kg)" data={bwData} color="#38bdf8" unit="" />}

      <div style={{ marginTop:20 }}>
        <Label>PERSONAL RECORDS</Label>
        {prEntries.length === 0 ? (
          <div style={{ color:"#333", fontSize:14, padding:"24px 0", textAlign:"center" }}>
            Log your first workout to start tracking PRs
          </div>
        ) : prEntries.map(({ ex, pr }) => (
          <div key={ex.id} style={{
            display:"flex", justifyContent:"space-between", alignItems:"center",
            padding:"13px 0", borderBottom:"1px solid #1a1a1a"
          }}>
            <span style={{ color:"#aaa", fontSize:14 }}>{ex.name}</span>
            <span style={{ color:"#fbbf24", fontWeight:800, fontSize:14 }}>
              {ex.type==="time" ? `${pr.seconds}s` : `${pr.reps} reps${(pr.weight??0)>0?` @${pr.weight}kg`:""}`}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function NutritionView({ nutritionLog, setNutritionLog, bodyweightLog, setBodyweightLog }) {
  const today = new Date().toISOString().split("T")[0];
  const entry = nutritionLog[today] ?? { protein:0, calories:0 };
  const bw = bodyweightLog[today] ?? 0;

  const up = (field, val) => setNutritionLog(prev => ({ ...prev, [today]: { ...entry, [field]: val } }));

  const proteinTarget = 195;
  const calTarget = 2400;
  const deficit = calTarget - entry.calories;

  const bwData = useMemo(() => {
    const keys = Object.keys(bodyweightLog).sort().slice(-7);
    return keys.map(k => ({ label: k.slice(5), value: bodyweightLog[k] }));
  }, [bodyweightLog]);

  return (
    <div style={{ padding:"16px 16px 90px" }}>
      <div style={{ fontSize:22, fontWeight:900, marginBottom:2 }}>FUEL</div>
      <div style={{ fontSize:12, color:"#444", marginBottom:22, letterSpacing:1 }}>{today}</div>

      <Card label="BODY WEIGHT (kg)">
        <Stepper value={bw} onChange={v => setBodyweightLog(prev => ({...prev,[today]:v}))} step={0.1} accent="#38bdf8" wide />
      </Card>

      <Card label={`PROTEIN — ${entry.protein}g / ${proteinTarget}g target`}>
        <Stepper value={entry.protein} onChange={v => up("protein",v)} step={5} accent="#4ade80" wide />
        <ProgressBar pct={(entry.protein/proteinTarget)*100} color="#4ade80" />
      </Card>

      <Card label={`CALORIES — ${entry.calories} / ${calTarget} target`}>
        <Stepper value={entry.calories} onChange={v => up("calories",v)} step={50} accent="#f97316" wide />
        <ProgressBar pct={(entry.calories/calTarget)*100} color="#f97316" />
        {entry.calories > 0 && (
          <div style={{ marginTop:10, fontSize:13, fontWeight:700, color: deficit>0?"#4ade80":"#fb7185" }}>
            {deficit>0 ? `${deficit} cal deficit` : `${Math.abs(deficit)} cal surplus`}
          </div>
        )}
      </Card>

      {bwData.length > 1 && <MiniChart title="WEIGHT TREND (7 days · kg)" data={bwData} color="#38bdf8" unit="" />}
    </div>
  );
}

function SettingsView({ workoutLog, nutritionLog, recoveryLog }) {
  const exportCSV = () => {
    const rows = [["date","exercise","set","reps","weight_kg","seconds","difficulty","note"]];
    for (const [dt, exMap] of Object.entries(workoutLog))
      for (const [exId, sets] of Object.entries(exMap))
        if (Array.isArray(sets))
          sets.forEach((s,i) => rows.push([
            dt, exId, i+1,
            s.reps ?? "", s.weight ?? "", s.seconds ?? "",
            s.difficulty ?? "",
            `"${(s.note??"").replace(/"/g,"'")}"`
          ]));
    const blob = new Blob([rows.map(r=>r.join(",")).join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "kineticos-workouts.csv"; a.click();
  };

  const exportJSON = () => {
    const data = { workoutLog, nutritionLog, recoveryLog, exported: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "kineticos-data.json"; a.click();
  };

  const stats = useMemo(() => {
    let sessions=0, sets=0, reps=0, seconds=0;
    for (const exMap of Object.values(workoutLog)) {
      if (!exMap || typeof exMap !== "object") continue;
      const hasData = Object.values(exMap).some(s => Array.isArray(s) && s.length > 0);
      if (hasData) sessions++;
      for (const s of Object.values(exMap)) {
        if (!Array.isArray(s)) continue;
        sets += s.length;
        for (const set of s) {
          reps += set.reps ?? 0;
          seconds += set.seconds ?? 0;
        }
      }
    }
    return { sessions, sets, reps, hours: Math.round(seconds/3600) };
  }, [workoutLog]);

  return (
    <div style={{ padding:"16px 16px 90px" }}>
      <div style={{ fontSize:22, fontWeight:900, marginBottom:20 }}>SETTINGS</div>

      <Card label="LIFETIME STATS">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {[["Sessions",stats.sessions],["Total Sets",stats.sets],["Total Reps",stats.reps],["Hold Hours",stats.hours]].map(([l,v])=>(
            <div key={l} style={{ background:"#1a1a1a", borderRadius:12, padding:"14px 12px", textAlign:"center" }}>
              <div style={{ fontSize:26, fontWeight:900 }}>{v}</div>
              <div style={{ color:"#555", fontSize:10, marginTop:3, letterSpacing:1 }}>{l.toUpperCase()}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card label="EXPORT DATA">
        <div style={{ display:"flex", gap:10 }}>
          {[["CSV","#4ade80",exportCSV],["JSON","#38bdf8",exportJSON]].map(([l,c,fn])=>(
            <button key={l} onClick={fn} style={{
              flex:1, padding:"13px", borderRadius:12,
              border:`1px solid ${c}44`, background:`${c}0d`,
              color:c, cursor:"pointer", fontSize:14, fontWeight:800
            }}>Export {l}</button>
          ))}
        </div>
        <div style={{ color:"#333", fontSize:11, marginTop:10 }}>
          CSV opens in Excel/Sheets. JSON for full backup and restore.
        </div>
      </Card>

      <Card label="INSTALL ON HOME SCREEN">
        <div style={{ color:"#888", fontSize:14, lineHeight:1.8 }}>
          <strong style={{color:"#ccc"}}>iPhone Safari:</strong> tap the Share icon → "Add to Home Screen"<br/>
          <strong style={{color:"#ccc"}}>Android Chrome:</strong> tap ⋮ → "Add to Home screen"<br/>
          <span style={{color:"#444",fontSize:12}}>Runs full-screen. Works offline after first load.</span>
        </div>
      </Card>

      <div style={{ color:"#252525", fontSize:11, textAlign:"center", marginTop:24, letterSpacing:1 }}>
        KINETICOS v1 · All data stays on your device
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [workoutLog,    setWorkoutLog]    = useLocalStorage("kineticos_w1", {});
  const [recoveryLog,   setRecoveryLog]   = useLocalStorage("kineticos_r1", {});
  const [nutritionLog,  setNutritionLog]  = useLocalStorage("kineticos_n1", {});
  const [bodyweightLog, setBodyweightLog] = useLocalStorage("kineticos_b1", {});
  const [customTargets, setCustomTargets] = useLocalStorage("kineticos_t1", {});
  const [tab, setTab] = useState("workout");

  const onSaveTarget = useCallback((exId, target) => {
    setCustomTargets(prev => ({ ...prev, [exId]: target }));
  }, [setCustomTargets]);

  const prMap = useMemo(() => {
    const map = {};
    // New structure: workoutLog[dateKey][exId] = sets[]
    for (const dayData of Object.values(workoutLog)) {
      if (!dayData || typeof dayData !== "object") continue;
      for (const [exId, sets] of Object.entries(dayData)) {
        if (!Array.isArray(sets) || !sets.length) continue;
        const ex = ALL_EXERCISES.find(e => e.id === exId);
        if (!ex) continue;
        if (ex.type === "reps") {
          const top = sets.reduce((b,s)=>(s.reps??0)>(b?.reps??0)?s:b, null);
          if (top && (top.reps??0) > (map[exId]?.reps??0)) map[exId] = top;
        } else {
          const top = sets.reduce((b,s)=>(s.seconds??0)>(b?.seconds??0)?s:b, null);
          if (top && (top.seconds??0) > (map[exId]?.seconds??0)) map[exId] = top;
        }
      }
    }
    return map;
  }, [workoutLog]);

  const tabs = [
    { id:"workout",  label:"TRAIN",   icon:"◉" },
    { id:"recovery", label:"RECOVER", icon:"♡" },
    { id:"stats",    label:"STATS",   icon:"▦" },
    { id:"fuel",     label:"FUEL",    icon:"◎" },
    { id:"settings", label:"MORE",    icon:"≡" },
  ];

  return (
    <div style={{
      fontFamily:"'DM Mono','Courier New',monospace",
      background:"#0a0a0a", color:"#fff",
      minHeight:"100svh", maxWidth:480, margin:"0 auto",
      position:"relative", overflowX:"hidden"
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');
        *, *::before, *::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
        input[type=number] { -moz-appearance:textfield; }
        ::-webkit-scrollbar { display:none; }
        html { scroll-behavior:smooth; }
        @keyframes slideUp {
          from { opacity:0; transform:translateY(8px); }
          to   { opacity:1; transform:none; }
        }
        .view { animation: slideUp 0.18s ease both; }
        button { font-family:inherit; }
        input, textarea { font-family:inherit; }
      `}</style>

      {/* Fixed header */}
      <div style={{
        position:"sticky", top:0, zIndex:10,
        background:"#0a0a0a", borderBottom:"1px solid #141414",
        padding:"14px 18px 12px",
        display:"flex", justifyContent:"space-between", alignItems:"center"
      }}>
        <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:24, letterSpacing:4, lineHeight:1 }}>
          KINETIC<span style={{color:"#4ade80"}}>OS</span>
        </div>
        <div style={{ fontSize:11, color:"#333", letterSpacing:0.5 }}>
          {new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
        </div>
      </div>

      {/* Page content */}
      <div className="view" key={tab} style={{ paddingTop:4 }}>
        {tab==="workout"  && <WorkoutView   workoutLog={workoutLog}   setWorkoutLog={setWorkoutLog}   prMap={prMap} customTargets={customTargets} onSaveTarget={onSaveTarget} />}
        {tab==="recovery" && <RecoveryView  recoveryLog={recoveryLog}  setRecoveryLog={setRecoveryLog} />}
        {tab==="stats"    && <DashboardView workoutLog={workoutLog}   prMap={prMap} bodyweightLog={bodyweightLog} customTargets={customTargets} />}
        {tab==="fuel"     && <NutritionView nutritionLog={nutritionLog} setNutritionLog={setNutritionLog} bodyweightLog={bodyweightLog} setBodyweightLog={setBodyweightLog} />}
        {tab==="settings" && <SettingsView  workoutLog={workoutLog}   nutritionLog={nutritionLog} recoveryLog={recoveryLog} />}
      </div>

      {/* Bottom nav */}
      <div style={{
        position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:480,
        background:"rgba(10,10,10,0.97)", backdropFilter:"blur(12px)",
        borderTop:"1px solid #181818",
        display:"flex",
        paddingBottom:"max(10px, env(safe-area-inset-bottom))",
        paddingTop:8,
        zIndex:20
      }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex:1, background:"none", border:"none", cursor:"pointer",
            display:"flex", flexDirection:"column", alignItems:"center", gap:4,
            color: tab===t.id ? "#4ade80" : "#888",
            padding:"2px 4px",
            transition:"color 0.12s"
          }}>
            <span style={{ fontSize:19, lineHeight:1 }}>{t.icon}</span>
            <span style={{ fontSize:11, letterSpacing:1, fontWeight:700, lineHeight:1 }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
  </script>
  <script>
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
